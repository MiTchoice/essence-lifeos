<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESSENCE — MyLifeMyChoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* Prevent flash of unstyled content */
    html { background: #06080f; }
    #root { opacity: 0; transition: opacity 0.2s; }
    #root.ready { opacity: 1; }
  </style>
  <script>
    // Apply theme before render
    const t = localStorage.getItem('essence_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
    const bg = {dark:'#06080f',light:'#f0f2f9',midnight:'#000000'};
    document.documentElement.style.backgroundColor = bg[t]||bg.dark;
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Show root after first paint
    requestAnimationFrame(()=>{ setTimeout(()=>{ const r=document.getElementById('root'); if(r) r.classList.add('ready'); },50); });
  </script>
</body>
</html>
